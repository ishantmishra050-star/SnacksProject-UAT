databases:
  - name: snacksproject-db
    databaseName: snacks
    user: snacks

services:
  - type: web
    name: snacksproject-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: snacksproject-db
          property: connectionString
